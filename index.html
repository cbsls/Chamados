<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Solicitações</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6f9;
}

.header {
  background:#2563eb;
  color:#fff;
  padding:20px;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

.card {
  background:#fff;
  padding:15px;
  margin:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

input, select, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
}

.hidden { display:none; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px;
  box-shadow:0 -2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h3>Login</h3>
    <input id="idFunc" placeholder="ID Funcional">
    <input id="senha" placeholder="Senha" type="password">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="header">
    <h3 id="nomeUser"></h3>
    <h2 id="saldo">R$ 0,00</h2>
    <button onclick="addSaldo()" id="btnSaldo" class="hidden">+ Saldo</button>
  </div>

  <div class="card">
    <button onclick="abrirNova('Reparo')">🛠️ Reparo</button>
    <button onclick="abrirNova('Compra')">🛒 Compra</button>
  </div>

  <div id="lista"></div>

  <div id="nova" class="card hidden">
    <h3>Nova Solicitação</h3>

    <select id="tipo">
      <option>Reparo</option>
      <option>Compra</option>
    </select>

    <input id="titulo" placeholder="Título">
    <textarea id="descricao" placeholder="Descrição"></textarea>
    <input id="link" placeholder="Link">

    <button onclick="criar()">Enviar</button>
  </div>

</div>

<div class="nav hidden" id="nav">
  <button onclick="mostrarHome()">Início</button>
  <button onclick="mostrarNova()">Nova</button>
</div>

<script>

// 🔥 CLIENTE SUPABASE CORRIGIDO (SEM DUPLICAÇÃO)
const supabaseClient = window.supabase.createClient(
  'https://azltlpjyyqecurmebffm.supabase.co',
  'sb_publishable_ODDfIVnGOb1csV9DA8kURQ_pbKPeQNO'
)

let usuario = null
let isAdmin = false

// LOGIN
async function login() {
  const id = document.getElementById('idFunc').value.trim()
  const senha = document.getElementById('senha').value.trim()

  if (!id || !senha) {
    alert('Informe ID e senha')
    return
  }

  const { data, error } = await supabaseClient
    .from('usuarios')
    .select('*')
    .eq('id_func', id)
    .single()

  if (error || !data) {
    alert('Usuário não encontrado')
    return
  }

  if (data.senha !== senha) {
    alert('Senha incorreta')
    return
  }

  usuario = data
  isAdmin = data.tipo === 'admin'

  document.getElementById('nomeUser').innerText = data.nome_guerra || data.nome

  if (isAdmin) {
    document.getElementById('btnSaldo').classList.remove('hidden')
  }

  document.getElementById('login').classList.add('hidden')
  document.getElementById('app').classList.remove('hidden')
  document.getElementById('nav').classList.remove('hidden')

  carregarSaldo()
  carregarChamados()
}

// SALDO
async function carregarSaldo() {
  const { data } = await supabaseClient.from('financeiro').select('*').single()
  document.getElementById('saldo').innerText = 'R$ ' + Number(data.saldo_atual || 0).toFixed(2)
}

async function addSaldo() {
  const valor = prompt('Valor para adicionar:')
  if (!valor || isNaN(valor)) return

  const { data } = await supabaseClient.from('financeiro').select('*').single()

  let novo = Number(data.saldo_atual || 0) + Number(valor)

  await supabaseClient.from('financeiro').update({ saldo_atual: novo }).eq('id', 1)

  carregarSaldo()
}

// CHAMADOS
async function carregarChamados() {
  const { data } = await supabaseClient
    .from('chamados')
    .select('*')
    .order('data_criacao', { ascending: false })

  let html = ''

  data.forEach(c => {
    html += `
    <div class="card">
      <b>${c.tipo}</b> - ${c.status}<br>
      <b>${c.titulo}</b><br>
      ${c.descricao || ''}<br>
      ${c.valor_final ? '💰 R$ '+c.valor_final : ''}

      ${isAdmin ? `
        <br>
        <select onchange="updateStatus('${c.id}', this.value)">
          <option ${c.status=='Aberto'?'selected':''}>Aberto</option>
          <option ${c.status=='Em Orçamento'?'selected':''}>Em Orçamento</option>
          <option ${c.status=='Reparado'?'selected':''}>Reparado</option>
          <option ${c.status=='Comprado'?'selected':''}>Comprado</option>
          <option ${c.status=='Finalizado'?'selected':''}>Finalizado</option>
        </select>

        <input placeholder="Valor orçamento" onchange="updateValor('${c.id}', this.value)">
      ` : ''}
    </div>`
  })

  document.getElementById('lista').innerHTML = html
}

// CRIAR
async function criar() {

  const titulo = document.getElementById('titulo').value.trim()
  if (!titulo) return alert('Informe o título')

  await supabaseClient.from('chamados').insert({
    tipo: document.getElementById('tipo').value,
    titulo: titulo,
    descricao: document.getElementById('descricao').value,
    link: document.getElementById('link').value,
    status: 'Aberto',
    id_usuario: usuario.id
  })

  alert('Solicitação criada!')
  mostrarHome()
  carregarChamados()
}

// STATUS + DESCONTO
async function updateStatus(id, status) {

  await supabaseClient.from('chamados').update({ status }).eq('id', id)

  if (status === 'Reparado' || status === 'Comprado') {
    const valor = prompt('Valor final:')

    if (!valor || isNaN(valor)) return

    const { data } = await supabaseClient.from('financeiro').select('*').single()
    let novo = Number(data.saldo_atual || 0) - Number(valor)

    await supabaseClient.from('financeiro').update({ saldo_atual: novo }).eq('id', 1)

    await supabaseClient.from('chamados').update({
      valor_final: valor,
      data_execucao: new Date()
    }).eq('id', id)

    carregarSaldo()
  }

  carregarChamados()
}

// ORÇAMENTO
async function updateValor(id, valor) {
  if (!valor || isNaN(valor)) return
  await supabaseClient.from('chamados').update({ valor_orcamento: valor }).eq('id', id)
}

// UI
function mostrarNova() {
  document.getElementById('nova').classList.remove('hidden')
}

function mostrarHome() {
  document.getElementById('nova').classList.add('hidden')
}

function abrirNova(tipo) {
  mostrarNova()
  document.getElementById('tipo').value = tipo
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
}

</script>

</body>
</html>
