<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamados de Manutenção</title>

<style>
body { font-family: Arial; margin:0; padding:10px; background:#f5f5f5; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }
input, textarea, button, select {
  width:100%; padding:10px; margin-top:8px;
  border-radius:8px; border:1px solid #ccc;
}
button { background:#075E54; color:#fff; font-weight:bold; }
.admin { border-top:1px solid #ddd; margin-top:10px; padding-top:10px; }
</style>
</head>

<body>

<div class="card">
<h3>Novo Chamado</h3>

<input id="nome" placeholder="Nome">
<input id="matricula" placeholder="Id Func">
<input id="titulo" placeholder="Título">
<textarea id="descricao" placeholder="Descrição (OBRIGATÓRIO)"></textarea>
<input id="local" placeholder="Local">

<button onclick="createTicket()">Enviar</button>
</div>

<div id="lista"></div>

<script type="module">

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://azltlpjyyqecurmebffm.supabase.co',
  'sb_publishable_ODDfIVnGOb1csV9DA8kURQ_pbKPeQNO'
)

let adminMode = true // já deixei ativo pra facilitar

// =========================
// FUNÇÃO MAIÚSCULO
// =========================
function upper(v){
  return String(v || '').trim().toUpperCase()
}

// =========================
// CRIAR CHAMADO
// =========================
async function createTicket(){

  const nome = upper(nomeInput.value)
  const matricula = matriculaInput.value
  const titulo = upper(tituloInput.value)
  const descricao = descricaoInput.value.trim()
  const local = upper(localInput.value)

  if(!descricao){
    alert("Descrição é obrigatória")
    return
  }

  await supabase.from('chamados').insert([{
    nome_solicitante: nome || 'NÃO IDENTIFICADO',
    matricula_solicitante: matricula,
    titulo,
    descricao,
    local,
    status: 'Aguardando triagem',
    prioridade: 'Média',
    setor_responsavel: 'B4'
  }])

  load()
}

// =========================
// ALTERAR CAMPOS NOVOS
// =========================
window.alterarValorCompra = async (id, valor)=>{
  await supabase.from('chamados')
    .update({ valor_compra: valor || null })
    .eq('id', id)
}

window.alterarDataCompra = async (id, data)=>{
  await supabase.from('chamados')
    .update({ data_compra: data || null })
    .eq('id', id)
}

// =========================
// LISTAR
// =========================
async function load(){

  const { data } = await supabase
    .from('chamados')
    .select('*')
    .order('created_at',{ascending:false})

  lista.innerHTML = data.map(c => `
    <div class="card">

      <b>${c.titulo}</b><br>
      ${c.descricao}<br><br>

      📍 ${c.local}<br>
      Status: ${c.status}<br>

      ${c.status === 'Finalizado' ? `
        <div>
          💰 Valor: R$ ${c.valor_compra || 0}<br>
          📅 Data: ${c.data_compra || '-'}
        </div>
      ` : ''}

      ${adminMode ? `
        <div class="admin">

          <select onchange="updateStatus('${c.id}', this.value)">
            <option>Aguardando triagem</option>
            <option>Finalizado</option>
          </select>

          <input type="number"
            placeholder="Valor da compra"
            value="${c.valor_compra || ''}"
            onblur="alterarValorCompra('${c.id}', this.value)">

          <input type="date"
            value="${c.data_compra || ''}"
            onblur="alterarDataCompra('${c.id}', this.value)">

        </div>
      ` : ''}

    </div>
  `).join('')
}

// =========================
// STATUS
// =========================
window.updateStatus = async (id, status)=>{
  await supabase.from('chamados')
    .update({ status })
    .eq('id', id)

  load()
}

// =========================
// MAIÚSCULO AUTOMÁTICO
// =========================
const nomeInput = document.getElementById('nome')
const tituloInput = document.getElementById('titulo')
const localInput = document.getElementById('local')
const matriculaInput = document.getElementById('matricula')
const descricaoInput = document.getElementById('descricao')
const lista = document.getElementById('lista')

;['nome','titulo','local'].forEach(id=>{
  document.getElementById(id).addEventListener('input', e=>{
    e.target.value = e.target.value.toUpperCase()
  })
})

// =========================
load()
// =========================

</script>

</body>
</html>
