<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamados</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body {
  margin:0;
  font-family: system-ui;
  background:#0f766e;
}

/* HEADER */
.header {
  color:#fff;
  padding:25px;
}

.saldo {
  font-size:22px;
  font-weight:bold;
}

/* CARD */
.card {
  background:#fff;
  margin:12px;
  padding:16px;
  border-radius:18px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* LISTA */
.item {
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  background:#f9fafb;
  cursor:pointer;
  transition:0.2s;
}

.item:hover {
  transform:scale(1.02);
}

/* STATUS */
.status {
  font-size:12px;
  padding:4px 8px;
  border-radius:8px;
  display:inline-block;
  margin-top:5px;
}

.aberto { background:#dbeafe }
.andamento { background:#fde68a }
.finalizado { background:#bbf7d0 }

/* BOTÃO */
.btn {
  background:#2563eb;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:12px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:12px;
  box-shadow:0 -4px 10px rgba(0,0,0,0.2);
}

/* MODAL */
.modal {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:20px;
  border-radius:20px 20px 0 0;
  box-shadow:0 -5px 15px rgba(0,0,0,0.3);
}

.hidden { display:none }

</style>
</head>

<body>

<div id="login">
  <div class="card">
    <h3>Login</h3>
    <input id="idFunc" placeholder="ID"><br><br>
    <input id="senha" type="password" placeholder="Senha"><br><br>
    <button class="btn" onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="hidden">

<div class="header">
  <h3 id="nome"></h3>
  <div class="saldo" id="saldo"></div>
  <button id="btnAdmin" class="btn hidden" onclick="ativarAdmin()">ADMIN</button>
</div>

<div id="lista"></div>

<div id="novo" class="hidden card">
  <h3>Novo</h3>
  <input id="titulo" placeholder="Título"><br><br>
  <textarea id="descricao"></textarea><br><br>
  <button class="btn" onclick="criar()">Salvar</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <h3 id="mTitulo"></h3>
  <p id="mDesc"></p>

  <div id="adminArea" class="hidden">
    <select id="mStatus">
      <option>Aberto</option>
      <option>Em Orçamento</option>
      <option>Reparado</option>
      <option>Comprado</option>
      <option>Finalizado</option>
    </select><br><br>

    <input id="mValor" placeholder="Valor"><br><br>
    <input id="mData" type="date"><br><br>

    <button class="btn" onclick="salvarAdmin()">Salvar</button>
  </div>

  <button onclick="fecharModal()">Fechar</button>
</div>

</div>

<div class="nav hidden" id="nav">
  <button onclick="mostrarLista()">🏠</button>
  <button onclick="mostrarNovo()">➕</button>
</div>

<script>

const supabaseClient = window.supabase.createClient(
  'https://azltlpjyyqecurmebffm.supabase.co',
  'sb_publishable_ODDfIVnGOb1csV9DA8kURQ_pbKPeQNO'
)

let user = null
let isAdmin = false
let atual = null

async function login() {

  const id = document.getElementById('idFunc').value
  const senha = document.getElementById('senha').value

  const { data } = await supabaseClient
    .from('usuarios')
    .select('*')
    .eq('id_func', id)
    .single()

  if (!data || data.senha !== senha) return alert('Erro login')

  user = data
  isAdmin = data.tipo === 'admin'

  document.getElementById('nome').innerText = data.nome_guerra || data.nome

  if (isAdmin) document.getElementById('btnAdmin').classList.remove('hidden')

  document.getElementById('login').classList.add('hidden')
  document.getElementById('app').classList.remove('hidden')
  document.getElementById('nav').classList.remove('hidden')

  carregarSaldo()
  carregarChamados()
}

function ativarAdmin(){
  if(prompt('Senha admin')==='123456'){
    isAdmin = true
    alert('Admin ativado')
  }
}

async function carregarSaldo(){
  const { data } = await supabaseClient.from('financeiro').select('*').single()
  document.getElementById('saldo').innerText = 'R$ '+Number(data.saldo_atual).toFixed(2)
}

async function carregarChamados(){

  const { data } = await supabaseClient
    .from('chamados')
    .select('*')
    .order('id',{ascending:false})

  const lista = document.getElementById('lista')
  lista.innerHTML = ''

  data.forEach(c => {

    let classe = 'aberto'
    if(c.status==='Finalizado') classe='finalizado'
    if(c.status==='Em Orçamento') classe='andamento'

    const div = document.createElement('div')
    div.className = 'item'
    div.innerHTML = `
      <b>${c.titulo}</b><br>
      <span class="status ${classe}">${c.status}</span>
    `

    div.onclick = () => abrirModal(c.id)

    lista.appendChild(div)
  })
}

async function abrirModal(id){

  const { data } = await supabaseClient
    .from('chamados')
    .select('*')
    .eq('id', id)
    .single()

  atual = data

  document.getElementById('mTitulo').innerText = data.titulo
  document.getElementById('mDesc').innerText = data.descricao

  document.getElementById('modal').classList.remove('hidden')

  if(isAdmin){
    document.getElementById('adminArea').classList.remove('hidden')
    document.getElementById('mStatus').value = data.status
  }
}

function fecharModal(){
  document.getElementById('modal').classList.add('hidden')
}

async function salvarAdmin(){

  const valor = Number(document.getElementById('mValor').value || 0)

  await supabaseClient.from('chamados').update({
    status: document.getElementById('mStatus').value,
    valor_final: valor,
    data_execucao: document.getElementById('mData').value
  }).eq('id', atual.id)

  fecharModal()
  carregarChamados()
  carregarSaldo()
}

async function criar(){

  await supabaseClient.from('chamados').insert({
    titulo: document.getElementById('titulo').value,
    descricao: document.getElementById('descricao').value,
    status:'Aberto',
    id_usuario:user.id
  })

  alert('Criado')
  mostrarLista()
  carregarChamados()
}

function mostrarNovo(){
  document.getElementById('novo').classList.remove('hidden')
  document.getElementById('lista').classList.add('hidden')
}

function mostrarLista(){
  document.getElementById('novo').classList.add('hidden')
  document.getElementById('lista').classList.remove('hidden')
}

</script>

</body>
</html>
